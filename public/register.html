<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – HostelMate</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="logo">🏠 HostelMate</div>
    <p>Register to start booking your hostel room. It takes less than 2 minutes.</p>
  </div>
  <div class="auth-right" style="overflow-y:auto">
    <h2>Create Account 🎓</h2>
    <p class="sub">Fill in your student details to get started</p>

    <div id="alert-box"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group" style="grid-column:1/-1">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Jane Wanjiku Kamau">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@university.ac.ke">
      </div>
      <div class="form-group">
        <label>Admission Number</label>
        <input type="text" id="admission_no" placeholder="BIT/2021/001">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="0712 345 678">
      </div>
      <div class="form-group">
        <label>Course</label>
        <input type="text" id="course" placeholder="BSc. Information Technology">
      </div>
      <div class="form-group">
        <label>Year of Study</label>
        <select id="year_of_study">
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password">
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>

    <p style="text-align:center;margin-top:1.2rem;color:var(--muted-txt);font-size:.875rem">
      Already have an account? <a href="/login.html" style="color:var(--primary);font-weight:600">Sign in</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  if (API.isLoggedIn()) window.location = '/index.html';

  async function doRegister() {
    const full_name     = document.getElementById('full_name').value.trim();
    const email         = document.getElementById('email').value.trim();
    const admission_no  = document.getElementById('admission_no').value.trim();
    const phone         = document.getElementById('phone').value.trim();
    const course        = document.getElementById('course').value.trim();
    const year_of_study = document.getElementById('year_of_study').value;
    const password      = document.getElementById('password').value;
    const confirm       = document.getElementById('confirm').value;
    const ab = document.getElementById('alert-box');
    const btn = document.getElementById('reg-btn');

    if (!full_name || !email || !admission_no || !password) return showAlert(ab, 'Full name, email, admission number and password are required.');
    if (password !== confirm) return showAlert(ab, 'Passwords do not match.');
    if (password.length < 6) return showAlert(ab, 'Password must be at least 6 characters.');

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const data = await API.post('/auth/register', { full_name, email, password, admission_no, phone, course, year_of_study });
      API.saveAuth(data.token, data.user);
      showAlert(ab, '✅ Account created! Redirecting…', 'success');
      setTimeout(() => window.location = '/rooms.html', 800);
    } catch (e) {
      showAlert(ab, e.message);
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
